<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>
  <link rel="icon" href="https://flagcdn.com/ar.svg" type="image/svg+xml">
</head>

<body style="font-family:sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px;">

<h2>Conversión por Inflación</h2>

<input id="monto" placeholder="Monto en pesos">
<input id="fechaDesde" placeholder="Fecha origen (DDMMYY)">
<input id="fechaHasta" placeholder="Fecha destino (DDMMYY)">

<button onclick="calcular()">Calcular</button>

<pre id="resultado"></pre>

<script>
let inflacionData = [];

async function cargarInflacion() {
  const res = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
  inflacionData = await res.json();
}

function parseFecha(texto) {
  const d = texto.slice(0,2);
  const m = texto.slice(2,4);
  const y = "20" + texto.slice(4,6);
  return new Date(`${y}-${m}-${d}`);
}

function obtenerIndiceHasta(fecha) {
  let factor = 1;

  for (let item of inflacionData) {
    const f = new Date(item.fecha);

    if (f <= fecha) {
      factor *= (1 + item.valor / 100);
    }
  }

  return factor;
}

function calcular() {
  try {
    const monto = parseFloat(document.getElementById("monto").value);
    const desde = parseFecha(document.getElementById("fechaDesde").value);
    const hasta = parseFecha(document.getElementById("fechaHasta").value);

    const indiceDesde = obtenerIndiceHasta(desde);
    const indiceHasta = obtenerIndiceHasta(hasta);

    const resultado = monto * (indiceHasta / indiceDesde);

    const formato = new Intl.NumberFormat("es-AR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    document.getElementById("resultado").innerText =
      `$${formato.format(resultado)} ARS`;

  } catch (e) {
    document.getElementById("resultado").innerText = "Error en los datos";
  }
}

// cargar datos al iniciar
cargarInflacion();
</script>

</body>
</html>
