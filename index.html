<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>
  <link rel="icon" href="https://flagcdn.com/ar.svg">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      font-size: 16px;
    }

    .fila {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 5px;
      width: 180px;
      font-size: 16px;
    }

    .preview {
      color: gray;
      white-space: nowrap;
    }

    button {
      margin-top: 15px;
      padding: 6px 12px;
      font-size: 16px;
    }

    h1 {
      font-size: 16px;
      text-decoration: underline;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div id="datos">Cargando datos...</div>

<h1>Calculadora de Inflación</h1>

<div style="display:flex; flex-direction:column; gap:12px; width:360px;">

  <div class="fila">
    <div>Monto en Pesos Argentinos:</div>
    <input id="monto" placeholder="Ej: 1000">
    <div id="previewMonto" class="preview"></div>
  </div>

  <div class="fila">
    <div>Fecha de Origen (DDMMYYYY):</div>
    <input id="fechaOrigen" placeholder="01012025">
    <div id="previewOrigen" class="preview"></div>
  </div>

  <div class="fila">
    <div>Fecha de Destino (DDMMYYYY):</div>
    <input id="fechaDestino" placeholder="01032025">
    <div id="previewDestino" class="preview"></div>
  </div>

</div>

<button onclick="calcular()">Calcular</button>

<div id="resultado" style="margin-top:15px;"></div>

<script>

const meses = [
  "Enero","Febrero","Marzo","Abril","Mayo","Junio",
  "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
];

let inflacionData = [];

/* =========================
   FETCH DATOS
========================= */

async function cargarDatos() {
  try {
    const inflacionRes = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
    inflacionData = await inflacionRes.json();

    const dolarRes = await fetch("https://dolarify-api.vercel.app/api/dolar");
    const dolar = await dolarRes.json();

    const ripteRes = await fetch("https://api.argly.com.ar/api/ripte");
    const ripte = await ripteRes.json();

    const ultima = inflacionData[inflacionData.length - 1];

    document.getElementById("datos").innerHTML = `
• Inflación (Mes de ${meses[new Date(ultima.fecha).getMonth()]}): ${ultima.valor.toString().replace(".", ",")}%<br>
• Dólar Blue (Venta): $${formatear(dolar.dolarBlue.venta)} ARS<br>
• Dólar Blue (Compra): $${formatear(dolar.dolarBlue.compra)} ARS<br>
• RIPTE: $${formatear(ripte.valor)} ARS
    `;

  } catch (e) {
    document.getElementById("datos").innerText = "Error cargando datos";
    console.error(e);
  }
}

/* =========================
   FORMATOS
========================= */

function formatear(num) {
  return new Intl.NumberFormat("es-AR").format(num);
}

/* =========================
   MONTO INPUT
========================= */

const monto = document.getElementById("monto");
const previewMonto = document.getElementById("previewMonto");

monto.addEventListener("input", (e) => {
  let limpio = e.target.value.replace(/\D/g, "");

  if (!limpio) {
    monto.value = "";
    previewMonto.innerText = "";
    return;
  }

  let numero = parseInt(limpio, 10);
  let formateado = formatear(numero);

  monto.value = formateado;

  // cursor al final
  monto.setSelectionRange(monto.value.length, monto.value.length);

  previewMonto.innerText = formateado + " ARS";
});

/* =========================
   FECHAS
========================= */

function autoFormato(input, preview) {
  input.addEventListener("input", () => {
    let v = input.value.replace(/\D/g, "");

    let nuevo = "";
    if (v.length > 0) nuevo = v.slice(0,2);
    if (v.length >= 3) nuevo += "-" + v.slice(2,4);
    if (v.length >= 5) nuevo += "-" + v.slice(4,8);

    input.value = nuevo;

    input.setSelectionRange(input.value.length, input.value.length);

    actualizarPreview();
  });
}

function parseFecha(str) {
  let [d,m,y] = str.split("-");
  return new Date(y, m-1, d);
}

function fechaTexto(f) {
  return `${f.getDate()} de ${meses[f.getMonth()]} de ${f.getFullYear()}`;
}

const fechaOrigen = document.getElementById("fechaOrigen");
const fechaDestino = document.getElementById("fechaDestino");

const previewOrigen = document.getElementById("previewOrigen");
const previewDestino = document.getElementById("previewDestino");

autoFormato(fechaOrigen, previewOrigen);
autoFormato(fechaDestino, previewDestino);

function actualizarPreview() {
  try {
    if (fechaOrigen.value.length === 10) {
      previewOrigen.innerText = fechaTexto(parseFecha(fechaOrigen.value));
    }
    if (fechaDestino.value.length === 10) {
      previewDestino.innerText = fechaTexto(parseFecha(fechaDestino.value));
    }
  } catch {}
}

/* =========================
   CALCULO INFLACION
========================= */

function calcular() {
  try {
    let montoBase = parseInt(monto.value.replace(/\./g,""));
    let f1 = parseFecha(fechaOrigen.value);
    let f2 = parseFecha(fechaDestino.value);

    let invertido = false;
    if (f1 > f2) {
      [f1, f2] = [f2, f1];
      invertido = true;
    }

    let valor = montoBase;

    for (let i = 0; i < inflacionData.length; i++) {
      let fechaMes = new Date(inflacionData[i].fecha);
      let tasa = inflacionData[i].valor;

      let inicioMes = new Date(fechaMes.getFullYear(), fechaMes.getMonth(), 1);
      let finMes = new Date(fechaMes.getFullYear(), fechaMes.getMonth()+1, 0);

      let inicio = new Date(Math.max(f1, inicioMes));
      let fin = new Date(Math.min(f2, finMes));

      if (inicio <= fin) {
        let dias = (fin - inicio) / (1000*60*60*24) + 1;
        let totalMes = finMes.getDate();

        let tasaDiaria = Math.pow(1 + tasa/100, 1/totalMes);
        valor *= Math.pow(tasaDiaria, dias);
      }
    }

    if (invertido) valor = montoBase / (valor / montoBase);

    document.getElementById("resultado").innerText =
      "Resultado: " + formatear(Math.round(valor)) + " ARS";

  } catch {
    document.getElementById("resultado").innerText = "Error en cálculo";
  }
}

/* ========================= */

cargarDatos();

</script>

</body>
</html>
