<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>

  <link rel="icon" href="https://flagcdn.com/w40/ar.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .container {
      font-size: 20px;
      line-height: 1.8;
    }

    .main {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="main" id="inflacion">
      Último dato de inflación (Mes): Cargando...
    </div>

    <div id="venta">
      Último dato de Dólar Blue (Venta): Cargando...
    </div>

    <div id="compra">
      Último dato de Dólar Blue (Compra): Cargando...
    </div>

  </div>

  <script>
    const meses = [
      "Enero", "Febrero", "Marzo", "Abril",
      "Mayo", "Junio", "Julio", "Agosto",
      "Septiembre", "Octubre", "Noviembre", "Diciembre"
    ];

    // 🔹 Inflación
    fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion")
      .then(res => res.json())
      .then(data => {
        const ultimo = data[data.length - 1];

        const fecha = ultimo.fecha.split("-");
        const mesNombre = meses[parseInt(fecha[1]) - 1];

        document.getElementById("inflacion").innerText =
          `Último dato de inflación (${mesNombre}): ${ultimo.valor}%`;
      });

    // 🔹 Dólar Blue
    fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares")
      .then(res => res.json())
      .then(data => {
        const blue = data.filter(d => d.casa === "blue").pop();

        document.getElementById("venta").innerText =
          `Último dato de Dólar Blue (Venta): $${blue.venta}`;

        document.getElementById("compra").innerText =
          `Último dato de Dólar Blue (Compra): $${blue.compra}`;
      });

  </script>

</body>
</html>
