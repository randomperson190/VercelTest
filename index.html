<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>
  <link rel="icon" href="https://flagcdn.com/ar.svg" type="image/svg+xml">
</head>

<body style="
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:30px;
">

<!-- ========================= -->
<!-- 📊 INDICADORES -->
<!-- ========================= -->

<pre id="output" style="font-size:16px;"></pre>

<!-- ========================= -->
<!-- 🧮 CALCULADORA -->
<!-- ========================= -->

<div style="display:flex; flex-direction:column; gap:10px; font-size:16px;">

  <label>Monto en Pesos Argentinos:</label>
  <input id="monto">

  <label>Fecha de Origen (DDMMYYYY):</label>
  <input id="fechaDesde" maxlength="10">

  <label>Fecha de Destino (DDMMYYYY):</label>
  <input id="fechaHasta" maxlength="10">

  <button onclick="calcular()">Calcular</button>

</div>

<pre id="resultado" style="font-size:16px;"></pre>

<script>
// =========================
// 📊 DATA GLOBAL
// =========================
let inflacionData = [];

// =========================
// 📊 CARGAR DATOS
// =========================
async function cargarTodo() {
  try {
    const resInflacion = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
    inflacionData = await resInflacion.json();

    const ultima = inflacionData[inflacionData.length - 1];

    const fecha = new Date(ultima.fecha);
    const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const mesNombre = meses[fecha.getMonth()];

    const resDolar = await fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares");
    const dataDolar = await resDolar.json();
    const blue = dataDolar.filter(d => d.casa === "blue");
    const ultimoBlue = blue[blue.length - 1];

    let ripteTexto = "No disponible";
    try {
      const r = await fetch("/api/ripte");
      const d = await r.json();

      if (d.ripte) {
        const f = new Intl.NumberFormat("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});
        ripteTexto = `$${f.format(d.ripte)} ARS`;
      }
    } catch {}

    const fDec = new Intl.NumberFormat("es-AR",{minimumFractionDigits:1,maximumFractionDigits:1});
    const fNum = new Intl.NumberFormat("es-AR");

    document.getElementById("output").innerText =
`• Inflación (Mes de ${mesNombre}): ${fDec.format(ultima.valor)}%
• Dólar Blue (Venta): $${fNum.format(ultimoBlue.venta)} ARS
• Dólar Blue (Compra): $${fNum.format(ultimoBlue.compra)} ARS
• RIPTE: ${ripteTexto}`;

  } catch {
    document.getElementById("output").innerText = "Error cargando datos";
  }
}

// =========================
// 📅 AUTOFORMATO FECHA
// =========================
function formatearFechaInput(input) {
  input.addEventListener("input", () => {
    let v = input.value.replace(/\D/g, "");

    if (v.length > 2) v = v.slice(0,2) + "-" + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + "-" + v.slice(5,9);

    input.value = v;
  });
}

formatearFechaInput(document.getElementById("fechaDesde"));
formatearFechaInput(document.getElementById("fechaHasta"));

// =========================
// 📅 PARSE FECHA
// =========================
function parseFecha(txt) {
  const limpio = txt.replace(/-/g,"");
  const d = limpio.slice(0,2);
  const m = limpio.slice(2,4);
  const y = limpio.slice(4,8);
  return new Date(`${y}-${m}-${d}`);
}

// =========================
// 📊 PRORRATEO DIARIO
// =========================
function factorEntreFechas(desde, hasta) {
  let factor = 1;

  for (let item of inflacionData) {
    const f = new Date(item.fecha);
    const year = f.getFullYear();
    const month = f.getMonth();

    const inicioMes = new Date(year, month, 1);
    const finMes = new Date(year, month + 1, 0);

    // intersección del rango
    const inicio = new Date(Math.max(inicioMes, desde));
    const fin = new Date(Math.min(finMes, hasta));

    if (inicio <= fin) {
      const diasMes = finMes.getDate();
      const diasTomados = Math.floor((fin - inicio)/(1000*60*60*24)) + 1;

      const inflacionMensual = item.valor / 100;

      // prorrateo exponencial correcto
      const inflacionPeriodo = Math.pow(1 + inflacionMensual, diasTomados / diasMes);

      factor *= inflacionPeriodo;
    }
  }

  return factor;
}

// =========================
// 🧮 CALCULAR
// =========================
function calcular() {
  try {
    const monto = parseFloat(document.getElementById("monto").value);
    const desde = parseFecha(document.getElementById("fechaDesde").value);
    const hasta = parseFecha(document.getElementById("fechaHasta").value);

    const factor = factorEntreFechas(desde, hasta);
    const resultado = monto * factor;

    const f = new Intl.NumberFormat("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById("resultado").innerText =
      `$${f.format(resultado)} ARS`;

  } catch {
    document.getElementById("resultado").innerText = "Error en los datos";
  }
}

// =========================
// 🚀 INIT
// =========================
cargarTodo();
</script>

</body>
</html>
