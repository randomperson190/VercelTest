<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>

  <link rel="icon" href="https://flagcdn.com/w40/ar.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: left;
    }

    .container {
      font-size: 22px;
      line-height: 2;
    }
  </style>
</head>

<body>

  <div class="container">
    <div id="inflacion">• Inflación: Cargando...</div>
    <div id="venta">• Dólar Blue (Venta): Cargando...</div>
    <div id="compra">• Dólar Blue (Compra): Cargando...</div>
    <div id="ripte">• RIPTE: Cargando...</div>
  </div>

  <script>
    const meses = [
      "Enero", "Febrero", "Marzo", "Abril",
      "Mayo", "Junio", "Julio", "Agosto",
      "Septiembre", "Octubre", "Noviembre", "Diciembre"
    ];

    // 🔹 Inflación
    fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion")
      .then(res => res.json())
      .then(data => {
        const ultimo = data[data.length - 1];

        const fecha = ultimo.fecha.split("-");
        const mesNombre = meses[parseInt(fecha[1]) - 1];

        document.getElementById("inflacion").innerText =
          `• Inflación (Mes de ${mesNombre}): ${ultimo.valor}%`;
      });

    // 🔹 Dólar Blue (último)
    fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares")
      .then(res => res.json())
      .then(data => {
        const blue = data.filter(d => d.casa === "blue").pop();

        document.getElementById("venta").innerText =
          `• Dólar Blue (Venta): $${blue.venta}`;

        document.getElementById("compra").innerText =
          `• Dólar Blue (Compra): $${blue.compra}`;
      });

    // 🔹 RIPTE (scraping)
fetch("https://www.argentina.gob.ar/trabajo/seguridadsocial/ripte")
  .then(res => res.text())
  .then(html => {

    let m = html.match(/\$\s*([0-9]+(?:\.[0-9]{3})*,[0-9]{2})/);
    if (!m) throw "No encontré monto RIPTE";

    let valorStr = m[1];

    let ripte = parseFloat(
      valorStr
        .replace(/\./g, "")
        .replace(",", ".")
    );

    // 👉 acá usás el elemento (tiene que existir en el HTML)
    document.getElementById("ripte").innerText =
      `• RIPTE (Remuneración Imponible Promedio de los Trabajadores Estables): $${ripte}`;

  })
  .catch(err => {
    console.error(err);
    document.getElementById("ripte").innerText =
      "• RIPTE: Error obteniendo dato";
  });

  </script>

</body>
</html>
