<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculador de Inflación</title>

<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        margin-top: 40px;
    }

    .container {
        width: 320px;
    }

    h2 {
        width: 100%;
        text-align: center;
        margin-bottom: 20px;
    }

    input, button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        font-size: 16px;
        box-sizing: border-box;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Calculador de Inflación</h2>

    <input type="text" id="fechaInicio" placeholder="Fecha inicio (dd-mm-yyyy)">
    <input type="text" id="fechaFin" placeholder="Fecha fin (dd-mm-yyyy)">
    <input type="text" id="monto" placeholder="Monto en ARS">

    <button onclick="calcular()">Calcular</button>

    <p id="resultado"></p>
</div>

<script>
// ==========================
// FORMATO FECHA (CORREGIDO)
// ==========================
function formatearFecha(input) {
    let valor = input.value.replace(/\D/g, '').slice(0, 8);

    let partes = [];
    if (valor.length >= 2) partes.push(valor.slice(0,2));
    if (valor.length >= 4) partes.push(valor.slice(2,4));
    if (valor.length > 4) partes.push(valor.slice(4,8));

    input.value = partes.join('-');
}

// ==========================
// FORMATO MONTO (ESTABLE)
// ==========================
const montoInput = document.getElementById("monto");

montoInput.addEventListener("input", function () {
    let cursor = this.selectionStart;

    // Permitir solo números
    let valor = this.value.replace(/\D/g, '');

    if (valor === "") {
        this.value = "";
        return;
    }

    // Formatear miles
    let formateado = new Intl.NumberFormat('es-AR').format(valor);

    this.value = formateado;

    // Restaurar cursor (clave para que no se rompa)
    this.setSelectionRange(this.value.length, this.value.length);
});

// ==========================
// EVENTOS FECHA
// ==========================
document.getElementById("fechaInicio").addEventListener("input", function() {
    formatearFecha(this);
});

document.getElementById("fechaFin").addEventListener("input", function() {
    formatearFecha(this);
});

// ==========================
// FUNCION CALCULAR
// ==========================
function calcular() {
    let monto = document.getElementById("monto").value.replace(/\./g, '');
    let resultado = document.getElementById("resultado");

    if (!monto) {
        resultado.innerText = "Ingresá un monto válido";
        return;
    }

    resultado.innerText = "Cálculo pendiente con API...";
}

// ==========================
// FUNCIONES APIs (QUE TENÍAS)
// ==========================

// Inflación
async function obtenerInflacion() {
    const res = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
    const data = await res.json();
    return data;
}

// Dólar
async function obtenerDolar() {
    const res = await fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares");
    const data = await res.json();
    return data;
}

// RIPTE (ejemplo si tenías endpoint)
async function obtenerRipte() {
    const res = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/ripte");
    const data = await res.json();
    return data;
}

</script>

</body>
</html>
