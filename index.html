<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>
  <link rel="icon" href="https://flagcdn.com/ar.svg" type="image/svg+xml">
</head>

<body style="
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  padding:30px;
  font-size:16px;
">

<pre id="output"></pre>

<h1 style="text-decoration: underline;">Calculadora de Inflación</h1>

<div style="display:flex; flex-direction:column; gap:12px; width:320px;">

  <!-- MONTO -->
  <label>Monto en Pesos Argentinos:</label>
  <div style="display:flex;">
    <input id="monto" style="width:100%;">
    <span id="previewMonto" style="color:gray; margin-left:10px; white-space:nowrap;"></span>
  </div>

  <!-- DESDE -->
  <label>Fecha de Origen (DDMMYYYY):</label>
  <div style="display:flex;">
    <input id="fechaDesde" maxlength="10" style="width:100%;">
    <span id="previewDesde" style="color:gray; margin-left:10px; white-space:nowrap;"></span>
  </div>

  <!-- HASTA -->
  <label>Fecha de Destino (DDMMYYYY):</label>
  <div style="display:flex;">
    <input id="fechaHasta" maxlength="10" style="width:100%;">
    <span id="previewHasta" style="color:gray; margin-left:10px; white-space:nowrap;"></span>
  </div>

  <button onclick="calcular()">Calcular</button>

</div>

<pre id="resultado"></pre>

<script>
let inflacionData = [];

// =========================
// CARGA
// =========================
async function cargarTodo() {
  const res = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
  inflacionData = await res.json();
}

// =========================
// FECHA (FIX TIMEZONE)
// =========================
function parseFecha(txt) {
  const limpio = txt.replace(/-/g,"");

  const d = parseInt(limpio.slice(0,2));
  const m = parseInt(limpio.slice(2,4)) - 1;
  const y = parseInt(limpio.slice(4,8));

  return new Date(y, m, d); // 👈 FIX
}

// =========================
// AUTO FORMATO
// =========================
function autoFormato(input) {
  input.addEventListener("input", () => {
    let v = input.value.replace(/\D/g, "");

    if (v.length > 2) v = v.slice(0,2) + "-" + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + "-" + v.slice(5,9);

    input.value = v;
    actualizarPreview();
  });
}

// =========================
// FACTOR
// =========================
function factorEntreFechas(desde, hasta) {
  if (desde > hasta) return 1 / factorEntreFechas(hasta, desde);

  let factor = 1;

  for (let item of inflacionData) {
    const f = new Date(item.fecha);
    const y = f.getFullYear();
    const m = f.getMonth();

    const inicioMes = new Date(y, m, 1);
    const finMes = new Date(y, m + 1, 0);

    const inicio = new Date(Math.max(inicioMes, desde));
    const fin = new Date(Math.min(finMes, hasta));

    if (inicio <= fin) {
      const diasMes = finMes.getDate();
      const dias = Math.floor((fin - inicio)/(1000*60*60*24)) + 1;

      const inflacion = item.valor / 100;
      const parcial = Math.pow(1 + inflacion, dias / diasMes);

      factor *= parcial;
    }
  }

  return factor;
}

// =========================
// PREVIEW
// =========================
const fNum = new Intl.NumberFormat("es-AR");

document.getElementById("monto").addEventListener("input", () => {
  const v = parseFloat(monto.value);
  previewMonto.innerText = isNaN(v) ? "" : `${fNum.format(v)} ARS`;
});

function fechaLarga(txt) {
  if (txt.length < 10) return "";

  const f = parseFecha(txt);

  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

  return `${f.getDate()} de ${meses[f.getMonth()]} de ${f.getFullYear()}`;
}

function actualizarPreview() {
  previewDesde.innerText = fechaLarga(fechaDesde.value);
  previewHasta.innerText = fechaLarga(fechaHasta.value);
}

// =========================
// CALCULAR
// =========================
function calcular() {
  try {
    const monto = parseFloat(document.getElementById("monto").value);
    const desde = parseFecha(fechaDesde.value);
    const hasta = parseFecha(fechaHasta.value);

    const resultado = monto * factorEntreFechas(desde, hasta);

    const f = new Intl.NumberFormat("es-AR",{minimumFractionDigits:2,maximumFractionDigits:2});

    document.getElementById("resultado").innerText =
      `$${f.format(resultado)} ARS`;

  } catch {
    resultado.innerText = "Error";
  }
}

  const montoInput = document.getElementById("monto");

montoInput.addEventListener("input", () => {
  let valor = montoInput.value;

  // Permitir solo números y coma
  valor = valor.replace(/[^0-9,]/g, "");

  // Separar parte entera y decimal
  let partes = valor.split(",");

  let entero = partes[0];
  let decimal = partes[1] || "";

  // Formatear miles
  if (entero.length > 0) {
    entero = parseInt(entero, 10).toLocaleString("es-AR");
  }

  // Limitar decimales a 2
  decimal = decimal.slice(0, 2);

  // Reconstruir valor
  montoInput.value = decimal.length > 0 ? `${entero},${decimal}` : entero;

  // Actualizar preview gris
  let numero = parseFloat(
    montoInput.value.replace(/\./g, "").replace(",", ".")
  );

  previewMonto.innerText = isNaN(numero)
    ? ""
    : `${new Intl.NumberFormat("es-AR").format(numero)} ARS`;
});
// INIT
autoFormato(fechaDesde);
autoFormato(fechaHasta);
cargarTodo();
</script>

</body>
</html>
