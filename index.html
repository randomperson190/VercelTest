<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Argentina Finanzas</title>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">

<pre id="output">Cargando datos...</pre>

<script>
async function cargarDatos() {
  try {
    // =========================
    // 📊 INFLACIÓN
    // =========================
    const resInflacion = await fetch("https://api.argentinadatos.com/v1/finanzas/indices/inflacion");
    const dataInflacion = await resInflacion.json();
    const ultimaInflacion = dataInflacion[dataInflacion.length - 1];

    const fecha = new Date(ultimaInflacion.fecha);
    const meses = [
      "Enero","Febrero","Marzo","Abril","Mayo","Junio",
      "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"
    ];
    const mesNombre = meses[fecha.getMonth()];

    // =========================
    // 💵 DÓLAR BLUE
    // =========================
    const resDolar = await fetch("https://api.argentinadatos.com/v1/cotizaciones/dolares");
    const dataDolar = await resDolar.json();

    const blueItems = dataDolar.filter(d => d.casa === "blue");
    const ultimoBlue = blueItems[blueItems.length - 1];

    // =========================
    // 📈 RIPTE (seguro)
    // =========================
    let ripteTexto = "No disponible";

    try {
      const resRipte = await fetch("https://www.argentina.gob.ar/trabajo/seguridadsocial/ripte");
      const html = await resRipte.text();

      console.log("HTML RIPTE:", html);

      let m = html.match(/\$\s*([0-9]+(?:\.[0-9]{3})*,[0-9]{2})/);

      if (m) {
        let valorStr = m[1];
        let ripte = parseFloat(
          valorStr
            .replace(/\./g, "")
            .replace(",", ".")
        );

        const formatoMoneda = new Intl.NumberFormat("es-AR", {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });

        ripteTexto = `$${formatoMoneda.format(ripte)} ARS`;
      }

    } catch (e) {
      console.warn("Error RIPTE:", e);
    }

    // =========================
    // 🎨 FORMATOS
    // =========================
    const formatoDecimal = new Intl.NumberFormat("es-AR", {
      minimumFractionDigits: 1,
      maximumFractionDigits: 1
    });

    const formatoNumero = new Intl.NumberFormat("es-AR");

    // =========================
    // 🧾 OUTPUT
    // =========================
    const texto = 
`• Inflación (Mes de ${mesNombre}): ${formatoDecimal.format(ultimaInflacion.valor)}%
• Dólar Blue (Venta): $${formatoNumero.format(ultimoBlue.venta)} ARS
• Dólar Blue (Compra): $${formatoNumero.format(ultimoBlue.compra)} ARS
• RIPTE: ${ripteTexto}`;

    document.getElementById("output").innerText = texto;

  } catch (error) {
    console.error("ERROR GENERAL:", error);
    document.getElementById("output").innerText = "Error cargando datos";
  }
}

cargarDatos();
</script>

</body>
</html>
