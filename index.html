<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Indicadores Argentina</title>
</head>
<body>

<pre id="output">Cargando datos...</pre>

<script>
async function cargarDatos() {
  try {
    // Ejemplo: podés reemplazar estos valores por tus APIs reales
    const inflacion = 2.9;
    const dolarVenta = 1405;
    const dolarCompra = 1395;
    const ripte = 1646344.54;

    // 📌 Formateadores argentinos
    const formatoNumero = new Intl.NumberFormat("es-AR");
    const formatoDecimal = new Intl.NumberFormat("es-AR", {
      minimumFractionDigits: 1,
      maximumFractionDigits: 1
    });
    const formatoMoneda = new Intl.NumberFormat("es-AR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    // 📌 Construcción del texto final
    const texto = 
`• Inflación (Mes de Febrero): ${formatoDecimal.format(inflacion)}%
• Dólar Blue (Venta): $${formatoNumero.format(dolarVenta)} ARS
• Dólar Blue (Compra): $${formatoNumero.format(dolarCompra)} ARS
• RIPTE: $${formatoMoneda.format(ripte)}`;

    document.getElementById("output").innerText = texto;

  } catch (error) {
    document.getElementById("output").innerText = "Error cargando datos";
  }
}

cargarDatos();
</script>

</body>
</html>
